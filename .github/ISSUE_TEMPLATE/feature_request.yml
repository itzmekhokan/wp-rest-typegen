name: Feature request
description: Suggest an improvement or new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: New flag, output shape, API, etc. Include an example if you can.
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This can be done without adding a runtime dependency.
