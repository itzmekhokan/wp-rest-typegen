name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # allow manual re-runs from the Actions tab

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      # Gate the release on a green build.
      - run: npm run build
      - run: npm run typecheck
      - run: npm test

      # Fail early if the tag (v1.2.3) doesn't match package.json's version.
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG"
            exit 1
          fi

      # Skip publishing if this exact version is already on the registry,
      # so re-running the workflow is safe and idempotent.
      - name: Check if version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already published — skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag || echo "::notice::Release for $GITHUB_REF_NAME may already exist."
